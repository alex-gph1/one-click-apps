captainVersion: 4
services:
  $$cap_appname-db:
    image: postgres:15
    volumes:
      - $$cap_appname-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    environment:
      POSTGRES_USER: $$cap_postgres_user
      POSTGRES_PASSWORD: $$cap_postgres_password
      POSTGRES_DB: $$cap_postgres_db
      PGDATA: /var/lib/postgresql/data/pgdata # Good practice to explicitly define PGDATA
    healthcheck: # Explicit healthcheck for PostgreSQL
      test: ['CMD-SHELL', 'pg_isready -U $$cap_postgres_user'] # Use variable for user
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # Give DB some time to start before checking
    caproverExtra:
      notExposeAsWebApp: true # This service is internal only
      containerHttpPort: "" # No HTTP port needed for the DB

  $$cap_appname-app:
    image: documenso/documenso:latest
    restart: unless-stopped
    depends_on:
      $$cap_appname-db:
        condition: service_healthy # Depend on the explicit healthcheck of the database
    environment:
      PORT: 3000
      NEXTAUTH_SECRET: $$cap_nextauth_secret
      NEXT_PRIVATE_ENCRYPTION_KEY: $$cap_encryption_key
      NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: $$cap_encryption_secondary_key
      NEXT_PUBLIC_WEBAPP_URL: https://$$cap_appname-app.$$cap_root_domain
      NEXT_PRIVATE_INTERNAL_WEBAPP_URL: http://$$cap_appname-app:3000
      NEXT_PRIVATE_DATABASE_URL: postgresql://$$cap_postgres_user:$$cap_postgres_password@srv-captain--$$cap_appname-db:5432/$$cap_postgres_db
      NEXT_PRIVATE_DIRECT_DATABASE_URL: postgresql://$$cap_postgres_user:$$cap_postgres_password@srv-captain--$$cap_appname-db:5432/$$cap_postgres_db
      NEXT_PUBLIC_UPLOAD_TRANSPORT: $$cap_upload_transport
      NEXT_PRIVATE_UPLOAD_ENDPOINT: $$cap_upload_endpoint
      NEXT_PRIVATE_UPLOAD_FORCE_PATH_STYLE: $$cap_upload_force_path_style
      NEXT_PRIVATE_UPLOAD_REGION: $$cap_upload_region
      NEXT_PRIVATE_UPLOAD_BUCKET: $$cap_upload_bucket
      NEXT_PRIVATE_UPLOAD_ACCESS_KEY_ID: $$cap_upload_access_key_id
      NEXT_PRIVATE_UPLOAD_SECRET_ACCESS_KEY: $$cap_upload_secret_access_key
      NEXT_PRIVATE_SMTP_TRANSPORT: $$cap_smtp_transport
      NEXT_PRIVATE_SMTP_HOST: $$cap_smtp_host
      NEXT_PRIVATE_SMTP_PORT: $$cap_smtp_port
      NEXT_PRIVATE_SMTP_USERNAME: $$cap_smtp_username
      NEXT_PRIVATE_SMTP_PASSWORD: $$cap_smtp_password
      NEXT_PRIVATE_SMTP_APIKEY_USER: $$cap_smtp_apikey_user
      NEXT_PRIVATE_SMTP_APIKEY: $$cap_smtp_apikey
      NEXT_PRIVATE_SMTP_SECURE: $$cap_smtp_secure
      NEXT_PRIVATE_SMTP_FROM_NAME: $$cap_smtp_from_name
      NEXT_PRIVATE_SMTP_FROM_ADDRESS: $$cap_smtp_from_address
      NEXT_PRIVATE_SMTP_SERVICE: $$cap_smtp_service
      NEXT_PRIVATE_RESEND_API_KEY: $$cap_resend_api_key
      NEXT_PRIVATE_MAILCHANNELS_API_KEY: $$cap_mailchannels_api_key
      NEXT_PRIVATE_MAILCHANNELS_ENDPOINT: $$cap_mailchannels_endpoint
      NEXT_PRIVATE_MAILCHANNELS_DKIM_DOMAIN: $$cap_mailchannels_dkim_domain
      NEXT_PRIVATE_MAILCHANNELS_DKIM_SELECTOR: $$cap_mailchannels_dkim_selector
      NEXT_PRIVATE_MAILCHANNELS_DKIM_PRIVATE_KEY: $$cap_mailchannels_dkim_private_key
      NEXT_PUBLIC_DOCUMENT_SIZE_UPLOAD_LIMIT: $$cap_document_size_upload_limit
      NEXT_PUBLIC_POSTHOG_KEY: $$cap_posthog_key
      NEXT_PUBLIC_DISABLE_SIGNUP: $$cap_disable_signup
      NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH: /opt/documenso/cert.p12
      NEXT_PRIVATE_SIGNING_PASSPHRASE: $$cap_signing_passphrase
      NEXT_PRIVATE_GOOGLE_CLIENT_ID: $$cap_google_client_id
      NEXT_PRIVATE_GOOGLE_CLIENT_SECRET: $$cap_google_client_secret
    volumes:
      - $$cap_appname-uploads:/opt/documenso/cert.p12
    healthcheck: # Explicit healthcheck for Documenso app
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1'] # Assuming a health endpoint
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # Give the app more time to start up and connect to DB
    caproverExtra:
      containerHttpPort: 3000 # The public-facing port for the app

caproverOneClickApp:
  variables:
    - id: $$cap_postgres_user
      label: PostgreSQL Username
      description: Username for the PostgreSQL database.
      defaultValue: documenso_user
      validRegex: "/^[a-zA-Z0-9_]+$/"

    - id: $$cap_postgres_password
      label: PostgreSQL Password
      description: Password for the PostgreSQL database. Make sure it's strong!
      defaultValue: $$cap_gen_random_hex(16)
      validRegex: "/^.{8,}$/"
      isSecret: true

    - id: $$cap_postgres_db
      label: PostgreSQL Database Name
      description: Name of the PostgreSQL database.
      defaultValue: documenso_db
      validRegex: "/^[a-zA-Z0-9_]+$/"

    - id: $$cap_nextauth_secret
      label: NextAuth Secret
      description: A random string for NextAuth. Generate using `openssl rand -base64 32`.
      defaultValue: $$cap_gen_random_hex(32)
      validRegex: "/^.{32,}$/"
      isSecret: true

    - id: $$cap_encryption_key
      label: Documenso Primary Encryption Key
      description: Primary encryption key. Generate using `openssl rand -base64 32`.
      defaultValue: $$cap_gen_random_hex(32)
      validRegex: "/^.{32,}$/"
      isSecret: true

    - id: $$cap_encryption_secondary_key
      label: Documenso Secondary Encryption Key
      description: Secondary encryption key. Generate using `openssl rand -base64 32`.
      defaultValue: $$cap_gen_random_hex(32)
      validRegex: "/^.{32,}$/"
      isSecret: true

    - id: $$cap_upload_transport
      label: Upload Transport
      description: Where to store uploaded documents 'database' or 's3'.
      defaultValue: database
      validRegex: "/^(database|s3)?$/"

    # S3 related variables (optional, based on upload_transport)
    - id: $$cap_upload_endpoint
      label: S3 Upload Endpoint (Optional, if using S3)
      description: S3 endpoint URL.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_upload_force_path_style
      label: S3 Force Path Style (true/false, Optional, if using S3)
      description: Force S3 path style addressing (e.g., for MinIO).
      defaultValue: "false"
      validRegex: "/^(true|false)?$/"

    - id: $$cap_upload_region
      label: S3 Upload Region (Optional, if using S3)
      description: S3 bucket region.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_upload_bucket
      label: S3 Upload Bucket (Optional, if using S3)
      description: S3 bucket name.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_upload_access_key_id
      label: S3 Access Key ID (Optional, if using S3)
      description: S3 access key ID.
      defaultValue: ""
      isSecret: true
      validRegex: "/^.*$/"

    - id: $$cap_upload_secret_access_key
      label: S3 Secret Access Key (Optional, if using S3)
      description: S3 secret access key.
      defaultValue: ""
      isSecret: true
      validRegex: "/^.*$/"

    # SMTP related variables
    - id: $$cap_smtp_transport
      label: SMTP Transport
      description: The transport protocol for sending emails (e.g., smtp, ses, mailchannels, resend).
      defaultValue: smtp
      validRegex: "/^(smtp|ses|mailchannels|resend)$/"

    - id: $$cap_smtp_host
      label: SMTP Host (Optional)
      description: SMTP server host.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_smtp_port
      label: SMTP Port (Optional)
      description: SMTP server port (e.g., 587, 465).
      defaultValue: ""
      validRegex: "/^\\d*$/"

    - id: $$cap_smtp_username
      label: SMTP Username (Optional)
      description: Username for SMTP authentication.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_smtp_password
      label: SMTP Password (Optional)
      description: Password for SMTP authentication.
      defaultValue: ""
      isSecret: true
      validRegex: "/^.*$/"

    - id: $$cap_smtp_apikey_user
      label: SMTP API Key User (Optional)
      description: API Key User for SMTP services (e.g., Mailgun, SendGrid).
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_smtp_apikey
      label: SMTP API Key (Optional)
      description: API Key for SMTP services (e.g., Mailgun, SendGrid).
      defaultValue: ""
      isSecret: true
      validRegex: "/^.*$/"

    - id: $$cap_smtp_secure
      label: SMTP Secure (true/false, Optional)
      description: Use TLS/SSL for SMTP. Set to 'true' for 465, 'false' for 587 (STARTTLS).
      defaultValue: "false"
      validRegex: "/^(true|false)?$/"

    - id: $$cap_smtp_from_name
      label: SMTP From Name
      description: The name displayed as the sender of emails.
      defaultValue: Documenso
      validRegex: "/^.+$/"

    - id: $$cap_smtp_from_address
      label: SMTP From Address
      description: The email address used as the sender.
      defaultValue: "no-reply@$$cap_appname.$$cap_root_domain"
      validRegex: "/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/"

    - id: $$cap_smtp_service
      label: SMTP Service (Optional)
      description: Specific email service provider (e.g., 'Gmail', 'Mailgun').
      defaultValue: ""
      validRegex: "/^.*$/"

    # Resend & Mailchannels variables (optional)
    - id: $$cap_resend_api_key
      label: Resend API Key (Optional)
      description: API Key for Resend email service.
      defaultValue: ""
      isSecret: true
      validRegex: "/^.*$/"

    - id: $$cap_mailchannels_api_key
      label: Mailchannels API Key (Optional)
      description: API Key for Mailchannels email service.
      defaultValue: ""
      isSecret: true
      validRegex: "/^.*$/"

    - id: $$cap_mailchannels_endpoint
      label: Mailchannels Endpoint (Optional)
      description: Endpoint for Mailchannels email service.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_mailchannels_dkim_domain
      label: Mailchannels DKIM Domain (Optional)
      description: DKIM domain for Mailchannels.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_mailchannels_dkim_selector
      label: Mailchannels DKIM Selector (Optional)
      description: DKIM selector for Mailchannels.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_mailchannels_dkim_private_key
      label: Mailchannels DKIM Private Key (Optional)
      description: DKIM private key for Mailchannels.
      defaultValue: ""
      isSecret: true
      validRegex: "/^.*$/"

    # Other Documenso specific variables
    - id: $$cap_document_size_upload_limit
      label: Document Upload Limit (MB, Optional)
      description: Maximum size for document uploads in MB.
      defaultValue: "50"
      validRegex: "/^\\d*$/"

    - id: $$cap_posthog_key
      label: PostHog Key (Optional)
      description: PostHog public key for analytics.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_disable_signup
      label: Disable Signups (true/false, Optional)
      description: Set to 'true' to disable new user signups.
      defaultValue: "false"
      validRegex: "/^(true|false)?$/"

    - id: $$cap_signing_passphrase
      label: Signing Passphrase (Optional)
      description: Passphrase for the signing certificate.
      defaultValue: ""
      isSecret: true
      validRegex: "/^.*$/"

    - id: $$cap_google_client_id
      label: Google Client ID (Optional)
      description: Google Client ID for OAuth.
      defaultValue: ""
      validRegex: "/^.*$/"

    - id: $$cap_google_client_secret
      label: Google Client Secret (Optional)
      description: Google Client Secret for OAuth.
      defaultValue: ""
      isSecret: true
      validRegex: "/^.*$/"

  instructions:
    start: Documenso is being deployed. This might take a few minutes as it includes a PostgreSQL database and waits for services to be healthy.
    end: Documenso has been successfully deployed! Please ensure all necessary environment variables are configured correctly for full functionality. Access it at https://$$cap_appname.$$cap_root_domain. Remember to upload your `cert.p12` file to the app's persistent volume if digital signing is required.
    fail: Documenso deployment failed. Check the CapRover logs for more details.

  displayName: Documenso
  description: Open-Source DocuSign Alternative
  isOfficial: false