captainVersion: 4
services:
    $$cap_appname:
        image: vikunja/vikunja:$$cap_vikunja_version
        environment:
            VIKUNJA_SERVICE_PUBLICURL: $$cap_public_url
            VIKUNJA_SERVICE_SECRET: $$cap_service_secret
            VIKUNJA_SERVICE_TIMEZONE: $$cap_timezone
            VIKUNJA_SERVICE_ENABLEREGISTRATION: $$cap_enable_registration
            VIKUNJA_DATABASE_TYPE: postgres
            VIKUNJA_DATABASE_HOST: srv-captain--$$cap_appname-db
            VIKUNJA_DATABASE_USER: $$cap_db_user
            VIKUNJA_DATABASE_PASSWORD: $$cap_db_password
            VIKUNJA_DATABASE_DATABASE: $$cap_db_name
        volumes:
            - $$cap_appname-files:/app/vikunja/files
        depends_on:
            - $$cap_appname-db
        caproverExtra:
            containerHttpPort: '3456'

    $$cap_appname-db:
        image: paradedb/paradedb:$$cap_paradedb_version
        environment:
            POSTGRES_USER: $$cap_db_user
            POSTGRES_PASSWORD: $$cap_db_password
            POSTGRES_DB: $$cap_db_name
        volumes:
            - $$cap_appname-db-data:/var/lib/postgresql/data
        caproverExtra:
            notExposeAsWebApp: true

caproverOneClickApp:
    variables:
        - id: $$cap_vikunja_version
          label: Vikunja Version
          defaultValue: '2.3'
          description: Vikunja Docker image tag. See https://hub.docker.com/r/vikunja/vikunja/tags
          validRegex: /.{1,}/

        - id: $$cap_paradedb_version
          label: ParadeDB Version
          defaultValue: 0.23.1-pg18
          description: ParadeDB Docker image tag. This default uses PostgreSQL 18.
          validRegex: /.{1,}/

        - id: $$cap_public_url
          label: Vikunja Public URL
          defaultValue: https://$$cap_appname.$$cap_root_domain/
          description: Full public URL for Vikunja, including scheme and trailing slash.
          validRegex: /^https?:\/\/.+\/$/

        - id: $$cap_service_secret
          label: Service Secret
          defaultValue: $$cap_gen_random_hex(32)
          description: Secret used for signing and encryption. Keep stable across restarts.
          validRegex: /.{32,}/

        - id: $$cap_db_user
          label: Database User
          defaultValue: vikunja
          validRegex: /.{1,}/

        - id: $$cap_db_password
          label: Database Password
          defaultValue: $$cap_gen_random_hex(20)
          validRegex: /.{12,}/

        - id: $$cap_db_name
          label: Database Name
          defaultValue: vikunja
          validRegex: /.{1,}/

        - id: $$cap_timezone
          label: Timezone
          defaultValue: UTC
          description: TZ database name, for example UTC or America/New_York.
          validRegex: /.{1,}/

        - id: $$cap_enable_registration
          label: Enable Registration
          defaultValue: 'true'
          description: Set to false after the first account is created if registration should be closed.
          validRegex: /^(true|false)$/

    instructions:
        start: |-
            Vikunja will be deployed with a ParadeDB-backed PostgreSQL database.
            ParadeDB provides enhanced full-text search without a separate search service.
        end: |-
            Vikunja has been deployed.

            Open $$cap_public_url and create the first account. If this is a private instance, set Enable Registration to false after the initial account exists.

            Persistent data:
            - Vikunja files: $$cap_appname-files
            - ParadeDB data: $$cap_appname-db-data

            ParadeDB runs as the PostgreSQL backend and is not exposed as a web app.

    displayName: Vikunja with ParadeDB
    isOfficial: false
    description: Vikunja task management with ParadeDB-backed PostgreSQL full-text search.
    documentation: https://vikunja.io/docs/full-docker-example/ and https://vikunja.io/docs/paradedb/
