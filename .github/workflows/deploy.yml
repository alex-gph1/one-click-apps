name: Publish One Click Apps

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run publish
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
